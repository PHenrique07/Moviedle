<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOVIEDLE - Capas Infinitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── MESMAS VARIÁVEIS DO INDEX ─── */
    :root {
      --black:    #06060a;
      --deep:     #0e0b10;
      --surface:  #120f16;
      --border:   #2a1f30;
      --amber:    #c8903e;
      --amber-lt: #e8b86a;
      --neon:     #ff2255;
      --cyan:     #00c8e0;
      --cream:    #ddd0b8;
      --muted:    #6a5a50;
      --film:     #1a1218;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: 'Courier Prime', 'Courier New', monospace;
      overflow-x: hidden;
    }

    /* ─── EFEITOS GLOBAIS (Ruído e Linhas) ─── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,0,0,.16) 3px, rgba(0,0,0,.16) 4px
      );
      pointer-events: none; z-index: 9999;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='1'/%3E%3C/svg%3E");
      opacity: .055; pointer-events: none; z-index: 9998;
      animation: staticShift 8s steps(4) infinite;
    }
    @keyframes staticShift {
      0% { background-position: 0 0; } 25% { background-position: -60px 40px; }
      50% { background-position: 30px -20px; } 75% { background-position: -20px 60px; }
      100% { background-position: 0 0; }
    }

    .blinds {
      position: fixed; top: 0; left: 0; right: 0; height: 100vh;
      background: repeating-linear-gradient(
        180deg, rgba(200,144,62,.022) 0px, rgba(200,144,62,.022) 18px,
        transparent 18px, transparent 60px
      );
      pointer-events: none; z-index: 1;
    }

    .projector {
      position: fixed; top: -80px; right: 8vw; width: 0; height: 0;
      border-left: 260px solid transparent; border-right: 260px solid transparent;
      border-top: 800px solid rgba(200,144,62,.035);
      pointer-events: none; z-index: 1; filter: blur(40px);
    }

    .wrapper {
      position: relative; z-index: 2; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 24px 40px;
    }

    /* ─── TOPO (Navegação) ─── */
    .top-nav {
      width: 100%; max-width: 860px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 0;
      animation: fadeIn 0.8s ease-out both;
    }

    .back-btn {
      color: var(--amber); text-decoration: none;
      font-size: 12px; letter-spacing: 0.1em;
      display: flex; align-items: center; gap: 8px;
      transition: color 0.3s;
    }
    .back-btn:hover { color: var(--amber-lt); }

    .game-mode-title {
      font-family: 'Playfair Display', serif; font-style: italic;
      color: var(--muted); font-size: 16px;
    }

    /* ─── ÁREA DO JOGO ─── */
    .game-board {
      width: 100%; max-width: 500px;
      display: flex; flex-direction: column; align-items: center;
      margin-top: 20px;
      animation: riseUp 0.8s 0.2s cubic-bezier(.16,1,.3,1) both;
    }

    /* ─── CAPA DO FILME ─── */
    .poster-container {
      position: relative;
      width: 260px; height: 390px; /* Proporção padrão 2:3 de poster */
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    /* Placeholder para a imagem da capa (simulando o blur/pixel do Gamedle) */
    .poster-image {
      width: 100%; height: 100%;
      background: linear-gradient(45deg, #2a1f30, #ff2255, #c8903e, #00c8e0);
      /* O código abaixo cria aquele efeito pixelado de jogo adivinhação */
      filter: blur(15px); 
      transform: scale(1.1); /* Tira as bordas feias do blur */
      transition: filter 0.5s;
    }

    /* ─── STATUS / VIDAS ─── */
    .game-stats {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.1em; margin-bottom: 12px;
      text-transform: uppercase;
    }

    .lives-container {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .heart {
      color: var(--neon); font-size: 16px;
      text-shadow: 0 0 10px rgba(255,34,85,.5);
    }
    .heart.lost {
      color: var(--border); text-shadow: none;
    }

    /* ─── INPUT E BOTÕES ─── */
    .input-group {
      width: 100%; margin-bottom: 16px;
    }

    .search-input {
      width: 100%; padding: 16px 20px;
      background: var(--deep);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--cream);
      font-family: 'Courier Prime', monospace;
      font-size: 14px; text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-input:focus {
      outline: none; border-color: var(--amber);
      box-shadow: 0 0 15px rgba(200,144,62,.15);
    }
    .search-input::placeholder { color: var(--muted); }

    .action-buttons {
      width: 100%; display: flex; gap: 12px;
    }

    .btn {
      flex: 1; padding: 14px 0;
      font-family: 'Courier Prime', monospace; font-size: 12px;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; border-radius: 3px;
      transition: all 0.3s ease;
    }

    .btn-skip {
      background: transparent;
      border: 1px solid rgba(200,144,62,.38);
      color: var(--amber);
    }
    .btn-skip:hover {
      background: rgba(200,144,62,.1); border-color: var(--amber);
    }

    .btn-guess {
      background: var(--amber);
      border: 1px solid var(--amber);
      color: var(--black); font-weight: bold;
    }
    .btn-guess:hover {
      background: var(--amber-lt);
      box-shadow: 0 0 20px rgba(200,144,62,.4);
    }

    /* ─── Animações ─── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="blinds"></div>
  <div class="projector"></div>

  <div class="wrapper">

    <div class="top-nav">
      <a href="index.html" class="back-btn">&#8592; VOLTAR</a>
      <div class="game-mode-title">Capas Infinitas</div>
      <div style="width: 70px;"></div> </div>

    <div class="game-board">
      
      <div class="poster-container">
        <div class="poster-image"></div>
      </div>

      <div class="game-stats">6 vidas restantes</div>
      <div class="lives-container">
        <span class="heart">♥</span>
        <span class="heart">♥</span>
        <span class="heart">♥</span>
        <span class="heart">♥</span>
        <span class="heart">♥</span>
        <span class="heart">♥</span>
      </div>

      <div class="input-group">
        <input type="text" class="search-input" placeholder="Procure um filme..." autocomplete="off" />
      </div>

      <div class="action-buttons">
        <button class="btn btn-skip">Não sei</button>
        <button class="btn btn-guess">Adivinhar!</button>
      </div>

    </div>

  </div>

</body>
</html>
